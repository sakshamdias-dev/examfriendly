<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Examfriendly Admin</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: { "primary": "#00BFFF", "secondary": "#FFA500" }, fontFamily: { "display": ["Lexend", "sans-serif"] } } }
        }
    </script>
    <style>
        body { font-family: 'Lexend', sans-serif; }
        .modern-input { @apply w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-sm outline-none transition-all; }
        .modern-input:focus { @apply border-primary ring-4 ring-primary/10; }
        .dynamic-section-card { @apply bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-2xl p-5 shadow-sm relative transition-all; }
        .dynamic-section-card::before { content: ''; @apply absolute left-0 top-6 bottom-6 w-1 bg-primary rounded-full; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { @apply bg-slate-200 dark:bg-slate-700 rounded-full; }
    </style>
</head>
<body class="bg-[#f6f6f8] dark:bg-[#101622] text-slate-900 dark:text-slate-100">

<div class="flex h-screen overflow-hidden">
    <aside class="w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 p-6 flex flex-col gap-8">
        <h1 class="text-2xl font-bold text-primary">Examfriendly</h1>
        <nav class="flex flex-col gap-2">
            <div onclick="switchTab('overview', this)" class="tab-btn flex items-center gap-3 px-4 py-3 rounded-xl bg-primary/10 text-primary transition-all cursor-pointer">
                <span class="material-symbols-outlined">dashboard</span>
                <p class="text-sm font-semibold">Overview</p>
            </div>
            <div onclick="switchTab('courses', this)" class="tab-btn flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all cursor-pointer">
                <span class="material-symbols-outlined">book_2</span>
                <p class="text-sm font-medium">Courses Manager</p>
            </div>
            <div onclick="switchTab('registration', this)" class="tab-btn flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all cursor-pointer">
                <span class="material-symbols-outlined">Receipt_Long</span>
                <p class="text-sm font-medium">Registration Manager</p>
            </div>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto">
        <div id="overview-panel" class="p-8">
            <h3 class="text-2xl font-bold">Welcome back, Admin!</h3>
        </div>

        <div id="courses-manager-panel" class="hidden p-8">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-bold">Courses Manager</h3>
                <button onclick="openModal('course')" class="bg-secondary text-white px-6 py-2.5 rounded-xl font-bold shadow-lg shadow-secondary/20">+ Create Course</button>
            </div>
            <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 dark:bg-slate-800/50">
                        <tr>
                            <th class="p-4 text-xs font-bold uppercase text-slate-500">Course Name</th>
                            <th class="p-4 text-xs font-bold uppercase text-slate-500">Price</th>
                            <th class="p-4 text-xs font-bold uppercase text-slate-500 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="course-table-body" class="divide-y dark:divide-slate-800"></tbody>
                </table>
            </div>
        </div>

        <div id="reg-manager-panel" class="hidden p-8">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-bold">Registration Manager</h3>
                <button onclick="loadRegistrations()" class="text-primary text-sm font-bold flex items-center gap-2">
                    <span class="material-symbols-outlined">refresh</span> Refresh Data
                </button>
            </div>
            <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 dark:bg-slate-800/50">
                        <tr>
                            <th class="p-4 text-xs font-bold uppercase text-slate-500">Course Name</th>
                            <th class="p-4 text-xs font-bold uppercase text-slate-500">No of Entries</th>
                            <th class="p-4 text-xs font-bold uppercase text-slate-500 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="reg-table-body" class="divide-y dark:divide-slate-800"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div id="course-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
    <div class="bg-white dark:bg-slate-900 w-full max-w-4xl rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row max-h-[90vh]">
        
        <div id="modal-sidebar" class="w-full md:w-72 bg-slate-50 dark:bg-slate-800/50 p-8 border-r border-slate-100 dark:border-slate-800 flex flex-col justify-between">
            <div>
                <h3 id="modal-title" class="text-xl font-bold text-slate-900 dark:text-white mb-2">Manage</h3>
                <div id="live-preview-box" class="mt-8 p-4 rounded-2xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 shadow-sm">
                    <p class="text-[10px] uppercase tracking-widest font-bold text-slate-400 mb-2">Live Preview</p>
                    <div id="preview-name" class="text-sm font-bold text-primary truncate">New Course Title</div>
                    <div id="preview-price" class="text-lg font-black text-secondary">₹0</div>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col overflow-hidden">
            <div id="modal-body" class="p-8 overflow-y-auto custom-scrollbar">
                <form id="course-form" class="space-y-8">
                    <div class="space-y-4">
                        <label class="text-xs font-bold uppercase tracking-wider text-primary">Basic Information</label>
                        <input type="text" id="course-name" placeholder="Course Title" class="modern-input" required oninput="updatePreview()">
                        <input type="url" id="course-image" placeholder="Thumbnail URL" class="modern-input">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="price" oninput="updatePreview()" class="modern-input" placeholder="Price (₹)">
                            <select id="fee_type" class="modern-input">
                                <option value="one-time">One-time</option>
                                <option value="hourly">per Hour</option>
                                <option value="monthly">per Month</option>
                                <option value="annually">per Year</option>
                                <option value="subjectly">per Subject</option>
                            </select>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <label class="text-xs font-bold uppercase tracking-wider text-secondary">Registration</label>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <input type="date" id="course-deadline" class="modern-input">
                            <input type="number" id="course-entry" placeholder="Entry Size" class="modern-input">
                            <input type="url" id="course-reg-link" placeholder="Reg Link" class="modern-input">
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div class="flex items-center justify-between">
                            <label class="text-xs font-bold uppercase tracking-wider text-slate-400">Curriculum</label>
                            <button type="button" onclick="addSection()" class="text-xs font-bold text-primary">+ ADD SECTION</button>
                        </div>
                        <div id="sections-container" class="space-y-4"></div>
                    </div>
                </form>

                <div id="student-list-container" class="hidden space-y-4"></div>
            </div>

            <div id="modal-footer" class="p-6 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800 flex justify-end gap-4">
                <button type="button" onclick="closeModal()" class="px-6 py-2.5 text-sm font-bold text-slate-500">Discard</button>
                <button id="publish-btn" form="course-form" type="submit" class="bg-primary text-white px-10 py-2.5 rounded-xl font-bold shadow-lg shadow-primary/30 active:scale-95">
                    Publish Course
                </button>
            </div>
        </div>
    </div>
</div>

<script>
const _supabaseUrl = 'https://qomhhffaetgwjvifgcai.supabase.co';
const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFvbWhoZmZhZXRnd2p2aWZnY2FpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyMzY2NjQsImV4cCI6MjA4NjgxMjY2NH0.4Uf9enXmwlMEGZez8E9tNOzfh9AA74qcTUz15yfz1lQ';
const supabaseClient = supabase.createClient(_supabaseUrl, _supabaseKey);

let currentEditingId = null; // Track ID if editing

function switchTab(tabName, element) {
    document.querySelectorAll('.tab-btn').forEach(item => {
        item.classList.remove('bg-primary/10', 'text-primary');
        item.classList.add('text-slate-600', 'dark:text-slate-400');
    });
    element.classList.add('bg-primary/10', 'text-primary');
    
    document.getElementById('overview-panel').classList.toggle('hidden', tabName !== 'overview');
    document.getElementById('courses-manager-panel').classList.toggle('hidden', tabName !== 'courses');
    document.getElementById('reg-manager-panel').classList.toggle('hidden', tabName !== 'registration');
    
    if (tabName === 'courses') loadCourses();
    if (tabName === 'registration') loadRegistrations();
}

function openModal(mode) {
    const modal = document.getElementById('course-modal');
    const form = document.getElementById('course-form');
    const studentList = document.getElementById('student-list-container');
    const sidebar = document.getElementById('modal-sidebar');
    const publishBtn = document.getElementById('publish-btn');

    modal.classList.remove('hidden');

    if(mode === 'course') {
        document.getElementById('modal-title').innerText = currentEditingId ? "Edit Course" : "Create Course";
        publishBtn.innerText = currentEditingId ? "Update Course" : "Publish Course";
        form.classList.remove('hidden');
        studentList.classList.add('hidden');
        sidebar.classList.remove('hidden');
        publishBtn.classList.remove('hidden');
    } else {
        form.classList.add('hidden');
        studentList.classList.remove('hidden');
        sidebar.classList.add('hidden');
        publishBtn.classList.add('hidden');
    }
}

function closeModal() { 
    document.getElementById('course-modal').classList.add('hidden'); 
    document.getElementById('course-form').reset(); 
    document.getElementById('sections-container').innerHTML = ''; 
    currentEditingId = null; 
    updatePreview(); 
}

function updatePreview() {
    document.getElementById('preview-name').innerText = document.getElementById('course-name').value || "New Course Title";
    document.getElementById('preview-price').innerText = "₹" + (document.getElementById('price').value || "0");
}

function addSection(title = '', content = '') {
    const id = Date.now() + Math.random();
    const html = `<div id="sec-${id}" class="dynamic-section-card space-y-3">
        <div class="flex justify-between items-center">
            <input type="text" value="${title}" placeholder="Section Name" class="section-title bg-transparent font-bold outline-none border-b border-dashed w-2/3">
            <button type="button" onclick="this.parentElement.parentElement.remove()" class="text-red-500 material-symbols-outlined">delete</button>
        </div>
        <textarea placeholder="Content..." class="section-content w-full bg-slate-50 dark:bg-slate-800/50 rounded-xl p-3 text-sm min-h-[80px] outline-none">${content}</textarea>
    </div>`;
    document.getElementById('sections-container').insertAdjacentHTML('beforeend', html);
}

async function loadCourses() {
    const { data, error } = await supabaseClient.from('course_created').select('*').order('created_at', { ascending: false });
    if (error) return console.error(error);
    document.getElementById('course-table-body').innerHTML = data.map(c => `
        <tr class="border-b dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
            <td class="p-4 font-semibold">${c.name}</td>
            <td class="p-4 text-secondary font-bold">₹${c.price}</td>
            <td class="p-4 text-right flex justify-end gap-2">
                <button onclick='openEditModal(${JSON.stringify(c).replace(/'/g, "&apos;")})' class="text-primary hover:bg-primary/10 p-2 rounded-lg transition-all">
                    <span class="material-symbols-outlined text-sm">edit</span>
                </button>
                <button onclick="deleteCourse('${c.id}')" class="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-all">
                    <span class="material-symbols-outlined text-sm">delete</span>
                </button>
            </td>
        </tr>`).join('');
}

function openEditModal(course) {
    currentEditingId = course.id;
    openModal('course');
    
    document.getElementById('course-name').value = course.name;
    document.getElementById('course-image').value = course.img_url || '';
    document.getElementById('price').value = course.price;
    document.getElementById('fee_type').value = course.fee_type || 'one-time';
    document.getElementById('course-deadline').value = course.reg_deadline || '';
    document.getElementById('course-entry').value = course.entry_size || '';
    document.getElementById('course-reg-link').value = course.reg_link || '';

    const container = document.getElementById('sections-container');
    container.innerHTML = '';
    if (course.details && Array.isArray(course.details)) {
        course.details.forEach(sec => addSection(sec.title, sec.content));
    }
    updatePreview();
}

async function loadRegistrations() {
    const { data, error } = await supabaseClient
        .from('course_created')
        .select(`id, name, income_registrations (id)`);

    if (error) return console.error(error);

    document.getElementById('reg-table-body').innerHTML = data.map(course => {
        const count = course.income_registrations ? course.income_registrations.length : 0;
        return `
        <tr class="border-b dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50">
            <td class="p-4 font-bold text-slate-800 dark:text-white">${course.name}</td>
            <td class="p-4">
                <span class="bg-primary/10 text-primary px-3 py-1 rounded-full text-xs font-black">${count} Entries</span>
            </td>
            <td class="p-4 text-right flex justify-end gap-2">
                <button onclick="viewStudentDetails('${course.id}', '${course.name}')" class="bg-slate-100 dark:bg-slate-800 p-2 rounded-lg hover:text-primary transition-all">
                    <span class="material-symbols-outlined text-sm">person_search</span>
                </button>
                <button onclick="exportToCSV('${course.id}', '${course.name}')" class="bg-slate-100 dark:bg-slate-800 p-2 rounded-lg hover:text-green-500 transition-all">
                    <span class="material-symbols-outlined text-sm">download</span>
                </button>
            </td>
        </tr>`;
    }).join('');
}

async function viewStudentDetails(courseId, courseName) {
    openModal('registration');
    document.getElementById('modal-title').innerText = `Leads: ${courseName}`;
    const container = document.getElementById('student-list-container');
    container.innerHTML = '<p class="text-center animate-pulse">Fetching details...</p>';

    const { data: students, error } = await supabaseClient
        .from('income_registrations')
        .select('*')
        .eq('course_id', courseId);

    if (error) return alert("Error fetching students");

    container.innerHTML = students.length ? students.map(s => `
        <div class="bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 p-5 rounded-2xl shadow-sm space-y-4">
            <div class="flex justify-between items-start">
                <div>
                    <h4 class="font-bold text-lg text-slate-900 dark:text-white">${s.student_name}</h4>
                    <p class="text-xs text-slate-400">${s.student_email}</p>
                </div>
                <select onchange="updateStatus('${s.id}', this.value)" class="text-[10px] font-bold rounded-lg border-none bg-slate-100 dark:bg-slate-700">
                    <option value="New" ${s.status === 'New' ? 'selected' : ''}>NEW</option>
                    <option value="Contacted" ${s.status === 'Contacted' ? 'selected' : ''}>CONTACTED</option>
                    <option value="Paid" ${s.status === 'Paid' ? 'selected' : ''}>PAID</option>
                </select>
            </div>
            
            <div class="flex gap-4">
                <a href="tel:${s.phone_number}" class="flex-1 bg-slate-50 dark:bg-slate-900 p-2 rounded-xl text-center text-xs font-bold border border-slate-100 dark:border-slate-800 flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-sm">call</span> Call
                </a>
                <a href="https://wa.me/${s.whatsapp_no}?text=Hi%20${s.student_name}..." target="_blank" class="flex-1 bg-green-500/10 text-green-600 p-2 rounded-xl text-center text-xs font-bold flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-sm">chat</span> WhatsApp
                </a>
            </div>

            <div class="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Requirements</p>
                <p class="text-sm italic text-slate-600 dark:text-slate-300">"${s.requirements || 'None'}"</p>
            </div>
        </div>
    `).join('') : '<p class="text-center py-10 text-slate-400">No students registered yet.</p>';
}

async function updateStatus(regId, newStatus) {
    const { error } = await supabaseClient.from('income_registrations').update({ status: newStatus }).eq('id', regId);
    if (error) alert("Update failed");
}

async function deleteCourse(id) {
    if(confirm('Delete course?')) {
        await supabaseClient.from('course_created').delete().eq('id', id);
        loadCourses();
    }
}

document.getElementById('course-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const saveBtn = e.submitter;
    saveBtn.innerText = currentEditingId ? "Updating..." : "Publishing...";
    saveBtn.disabled = true;
    
    const sections = Array.from(document.querySelectorAll('.dynamic-section-card')).map(box => ({
        title: box.querySelector('.section-title').value,
        content: box.querySelector('.section-content').value
    }));

    const payload = {
        name: document.getElementById('course-name').value,
        price: parseFloat(document.getElementById('price').value) || 0,
        fee_type: document.getElementById('fee_type').value,
        img_url: document.getElementById('course-image').value,
        reg_link: document.getElementById('course-reg-link').value,
        reg_deadline: document.getElementById('course-deadline').value || null,
        entry_size: parseInt(document.getElementById('course-entry').value) || null,
        details: sections
    };

    let result;
    if (currentEditingId) {
        result = await supabaseClient.from('course_created').update(payload).eq('id', currentEditingId);
    } else {
        result = await supabaseClient.from('course_created').insert([payload]);
    }

    if (result.error) {
        alert(result.error.message);
    } else { 
        closeModal(); 
        loadCourses(); 
        alert(currentEditingId ? "Course Updated!" : "Course Published!");
    }

    saveBtn.disabled = false;
});

async function exportToCSV(courseId, courseName) {
    const { data: students, error } = await supabaseClient.from('income_registrations').select('*').eq('course_id', courseId);
    if (error || !students.length) return alert("No data to export");

    const headers = ["Name", "Email", "Phone", "WhatsApp", "Status", "Requirements", "Date"];
    const rows = students.map(s => [s.student_name, s.student_email, s.phone_number, s.whatsapp_no, s.status, `"${(s.requirements || '').replace(/"/g, '""')}"`, new Date(s.created_at).toLocaleDateString()]);

    let csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
    const link = document.createElement("a");
    link.setAttribute("href", encodeURI(csvContent));
    link.setAttribute("download", `Leads_${courseName}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>
</body>
</html>
