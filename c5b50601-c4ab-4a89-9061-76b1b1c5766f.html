<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Registration | 2026-27</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00BFFF; --secondary: #FF8C00; --white: #FFFFFF; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--primary) 0%, #007bb5 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: var(--white); padding: 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #444; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; background: var(--secondary); color: white; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #e67e00; transform: translateY(-1px); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #statusMsg { text-align: center; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>CBSE Registration</h2>
    <form id="registrationForm">
        <div class="field"><label>Name</label><input type="text" id="name" required></div>
        <div class="field"><label>Email</label><input type="email" id="email" required></div>
        <div class="field"><label>Phone Number</label><input type="tel" id="phone" required></div>
        <div class="field"><label>WhatsApp Number</label><input type="tel" id="whatsapp" required></div>
        <div class="field"><label>Requirements</label><textarea id="reqs" rows="4" placeholder="Max 500 words"></textarea></div>
        <button type="submit" id="submitBtn">Submit Registration</button>
        <div id="statusMsg"></div>
    </form>
</div>

<script>
    const _supabaseUrl = 'https://qomhhffaetgwjvifgcai.supabase.co';
    const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFvbWhoZmZhZXRnd2p2aWZnY2FpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyMzY2NjQsImV4cCI6MjA4NjgxMjY2NH0.4Uf9enXmwlMEGZez8E9tNOzfh9AA74qcTUz15yfz1lQ';
    const supabaseClient = supabase.createClient(_supabaseUrl, _supabaseKey);

    const form = document.getElementById('registrationForm');
    const statusMsg = document.getElementById('statusMsg');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = 'Processing...';

        const payload = {
            student_name: document.getElementById('name').value,
            student_email: document.getElementById('email').value,
            phone_number: document.getElementById('phone').value,
            whatsapp_no: document.getElementById('whatsapp').value,
            requirements: document.getElementById('reqs').value,
            course_id: "c5b50601-c4ab-4a89-9061-76b1b1c5766f",
            course_name: "Class 9 | CBSE 2026-27",
            status: "new"
        };

        // 1. Insert into Database
        const { error: dbError } = await supabaseClient.from('income_registrations').insert([payload]);

        if (dbError) {
            statusMsg.style.color = 'red';
            statusMsg.innerText = 'Error: ' + dbError.message;
            btn.disabled = false;
            return;
        }

        // 2. Call Edge Function (Bypasses CORS)
        statusMsg.style.color = 'black';
        statusMsg.innerText = 'Registration saved! Sending email...';

        const { error: funcError } = await supabaseClient.functions.invoke('send-registration-email', {
            body: payload
        });

        if (funcError) {
            statusMsg.style.color = 'orange';
            statusMsg.innerText = 'Saved! But email failed to send.';
        } else {
            statusMsg.style.color = 'green';
            statusMsg.innerText = 'Success! Registration complete and email sent.';
            form.reset();
        }
        
        btn.disabled = false;
        btn.innerText = 'Submit Registration';
    });
</script>

</body>
</html>
