<!DOCTYPE html>
<html class="scroll-smooth" lang="en">

<head>
    <script src="theme.js"></script>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Examfriendly | Empowering the Next Generation of Learners</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script src="navbar.js"></script>
    <script src="footer.js"></script>
    <style type="text/tailwindcss">
        html, body { overscroll-behavior-y: none; }
        :root { --deep-sky-blue: #00BFFF; --brand-orange: #FF8C00; }
        @layer base {
            .bg-deep-sky-blue { background-color: var(--deep-sky-blue); }
            .text-deep-sky-blue { color: var(--deep-sky-blue); }
            .bg-brand-orange { background-color: var(--brand-orange); }
            .text-brand-orange { color: var(--brand-orange); }
        }
        @keyframes stepDown {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-step-down { animation: stepDown 0.4s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .navbar-bottom-line {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--deep-sky-blue), transparent);
        }

        @layer base {
            .bg-deep-sky-blue { background-color: var(--deep-sky-blue); }
            .text-deep-sky-blue { color: var(--deep-sky-blue); }
            .bg-brand-orange { background-color: var(--brand-orange); }
            .text-brand-orange { color: var(--brand-orange); }
            .border-deep-sky-blue { border-color: var(--deep-sky-blue); }
        }
        @keyframes continuousWipe {
            0% { transform: translateX(-150%); }
            70% { transform: translateX(250%); }
            100% { transform: translateX(250%); }
        }
        .navbar-wipe-v2 {
            position: absolute;
            top: 0;
            left: 0;
            width: 76%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 191, 255, 0.22), transparent);
            z-index: -1;
            animation: continuousWipe 13s linear infinite;
            animation-delay: 3s;
            filter: blur(14px);
        }
        @keyframes navLineGrow {
            0% { transform: scaleX(0); }
            100% { transform: scaleX(1); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes softFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes floatingSlow {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(15px, -15px); }
            66% { transform: translate(-10px, 10px); }
        }
        .navbar-bottom-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--deep-sky-blue), transparent);
            transform-origin: center;
            animation: navLineGrow 2.5s ease-out forwards;
        }
        .animate-fade-in-up {
            animation: fadeInUp 1s ease-out forwards;
        }
        .animate-soft-float {
            animation: softFloat 4s ease-in-out infinite;
        }
        .animate-gradient-shift {
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
        }
        .animate-floating-slow {
            animation: floatingSlow 6s ease-in-out infinite;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "primary": "#00BFFF", "accent": "#FF8C00" },
                    fontFamily: { "display": ["Lexend", "sans-serif"] }
                },
            },
        }
    </script>
</head>
<header class="relative z-[100]">
    <exam-navbar></exam-navbar>
</header>

<body class="font-display pt-24 bg-white text-slate-900 dark:bg-slate-950 dark:text-white antialiased overflow-x-hidden">
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-20 left-[10%] w-4 h-4 bg-primary opacity-20 rounded-full animate-floating-slow"></div>
        <div class="absolute top-40 right-[15%] w-3 h-3 bg-accent opacity-20 rounded-full animate-floating-slow"
            style="animation-delay: 1s;"></div>
        <div class="absolute bottom-40 left-[5%] w-6 h-6 border-2 border-primary opacity-10 rounded-full animate-floating-slow"
            style="animation-delay: 2s;"></div>
        <div class="absolute top-[60%] right-[10%] w-4 h-4 border-2 border-accent opacity-10 rounded-full animate-floating-slow"
            style="animation-delay: 1.5s;"></div>
        <div class="absolute top-[80%] left-[20%] w-2 h-2 bg-primary opacity-30 rounded-full animate-floating-slow"
            style="animation-delay: 0.5s;"></div>
    </div>
    <main class="max-w-7xl mx-auto py-16 px-6">
        <div class="text-center mb-16">
            <h1 class="text-4xl md:text-5xl font-black text-slate-900 dark:text-white mb-4">Available Courses</h1>
            <p class="text-slate-500">Transform your learning journey with our expert-led programs.</p>
        </div>

        <div id="courses-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="animate-pulse bg-slate-100 dark:bg-slate-800 h-96 rounded-[2.5rem]"></div>
            <div class="animate-pulse bg-slate-100 dark:bg-slate-800 h-96 rounded-[2.5rem]"></div>
            <div class="animate-pulse bg-slate-100 dark:bg-slate-800 h-96 rounded-[2.5rem]"></div>
        </div>
    </main>

    <script>
        let allCourses = [];
        const _supabaseUrl = 'https://qomhhffaetgwjvifgcai.supabase.co';
        const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFvbWhoZmZhZXRnd2p2aWZnY2FpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyMzY2NjQsImV4cCI6MjA4NjgxMjY2NH0.4Uf9enXmwlMEGZez8E9tNOzfh9AA74qcTUz15yfz1lQ';
        const supabaseClient = supabase.createClient(_supabaseUrl, _supabaseKey);

        async function fetchCourses() {
            const { data, error } = await supabaseClient
                .from('course_created')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error:", error.message);
                document.getElementById('courses-grid').innerHTML = `<p class="col-span-full text-center text-red-500">Failed to load courses.</p>`;
                return;
            }

            allCourses = data;
            renderUI(data);
        }

        function renderUI(courses) {
            const grid = document.getElementById('courses-grid');
            if (!courses.length) {
                grid.innerHTML = `<p class="col-span-full text-center py-20 text-slate-400">No courses available right now.</p>`;
                return;
            }

            grid.innerHTML = courses.map((course, index) => {
                // Determine label for frequency
                const frequencyLabel = {
                    'monthly': '/ mo',
                    'hourly': '/ hr',
                    'annually': '/ yr',
                    'subjectly': '/ sub'
                }[course.fee_type] || '';

                return `
                <div class="bg-white dark:bg-slate-900 rounded-[2.5rem] border border-slate-100 dark:border-slate-800 p-5 shadow-sm hover:shadow-2xl transition-all duration-300 flex flex-col group">
                    <div class="relative overflow-hidden rounded-[1.8rem] mb-6">
                        <img src="${course.img_url || course.image_url || 'https://via.placeholder.com/400x250'}" class="w-full h-52 object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute top-4 right-4 bg-white/95 dark:bg-slate-900/95 backdrop-blur px-4 py-2 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-800">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block leading-none mb-1">Fee</span>
                            <div class="flex items-baseline gap-1">
                                <span class="text-xl font-black text-accent">₹${course.price}</span>
                                <span class="text-[10px] font-bold text-slate-500 lowercase">${frequencyLabel}</span>
                            </div>
                        </div>
                    </div>
                    <div class="px-2 flex flex-col flex-1">
                        <h3 class="text-2xl font-bold mb-3 text-slate-800 dark:text-white">${course.name}</h3>
                        <div class="mt-auto space-y-3">
                            <button onclick="openDetails(${index})" class="w-full py-4 bg-slate-50 dark:bg-slate-800 text-slate-700 dark:text-slate-200 rounded-2xl font-bold text-sm hover:bg-primary hover:text-white transition-all">View Details</button>
                            <a href="${course.reg_link}" target="_blank" class="block w-full bg-primary text-white text-center py-4 rounded-2xl font-bold text-sm shadow-lg shadow-primary/20">Register Now</a>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function openDetails(index) {
            const course = allCourses[index];
            const modal = document.getElementById('course-modal');
            const body = document.getElementById('modal-body');

            document.getElementById('modal-title').innerText = course.name;
            document.getElementById('modal-enroll-btn').href = course.reg_link;

            const feeSuffix = {
                'monthly': 'per month',
                'hourly': 'per hour',
                'annually': 'per year',
                'subjectly': 'per subject',
                'one-time': 'full course fee'
            }[course.fee_type] || 'one-time fee';

            // Build Curriculum Sections
            const sections = course.details ? course.details.map(sec => `
                <div class="space-y-3">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-6 bg-primary rounded-full"></div>
                        <h4 class="text-lg font-bold text-slate-800 dark:text-white">${sec.title}</h4>
                    </div>
                    <div class="bg-slate-50 dark:bg-slate-800/50 p-6 rounded-3xl border border-slate-100 dark:border-slate-800 text-sm leading-relaxed text-slate-600 dark:text-slate-400">
                        ${sec.content.replace(/\n/g, '<br>')}
                    </div>
                </div>
            `).join('') : '<p class="text-slate-400">No details provided.</p>';

            body.innerHTML = `
                <div class="bg-accent/10 p-6 rounded-[2rem] border border-accent/20 flex justify-between items-center mb-6">
                    <div>
                        <p class="text-[10px] uppercase font-bold text-accent tracking-widest">Pricing</p>
                        <p class="text-3xl font-black text-accent">₹${course.price}</p>
                        <p class="text-[10px] font-medium text-accent/70 uppercase">${feeSuffix}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Batch Limit</p>
                        <p class="text-xl font-bold text-slate-700 dark:text-slate-200">${course.entry_size || 'Unlimited'}</p>
                    </div>
                </div>
                <div class="space-y-8">
                    ${sections}
                </div>
            `;

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('course-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('DOMContentLoaded', fetchCourses);
    </script>
<!--Model -->
<div id="course-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>
    
    <div class="relative bg-white dark:bg-slate-900 w-full max-w-2xl max-h-[85vh] overflow-hidden rounded-[2.5rem] shadow-2xl flex flex-col animate-step-down border border-slate-100 dark:border-slate-800">
        
        <div class="p-6 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-white/50 dark:bg-slate-900/50 backdrop-blur-md sticky top-0 z-10">
            <div>
                <h2 id="modal-title" class="text-2xl font-bold text-slate-900 dark:text-white">Course Details</h2>
                <p class="text-xs text-primary font-bold uppercase tracking-widest mt-1">Syllabus & Overview</p>
            </div>
            <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <span class="material-icons text-slate-500">close</span>
            </button>
        </div>

        <div id="modal-body" class="p-8 overflow-y-auto custom-scrollbar space-y-8 flex-grow">
            <div class="flex items-center justify-center py-20">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
            </div>
        </div>

        <div class="p-6 border-t border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50">
            <a id="modal-enroll-btn" href="#" target="_blank" class="block w-full bg-primary text-white text-center py-4 rounded-2xl font-bold shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all">
                Register & Enroll Now
            </a>
            <p class="text-center text-[10px] text-slate-400 mt-3 font-medium">Secure registration via Examfriendly Portal</p>
        </div>
    </div>
</div>
<footer>
<exam-footer></exam-footer>
</footer>
</body>
</html>
