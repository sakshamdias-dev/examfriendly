    <style type="text/tailwindcss">
    
        html, body {
  /* This stops the "rubber-band" bounce effect at the edges */
        overscroll-behavior-y: none; 
        }
        :root {
            --deep-sky-blue: #00BFFF;
            --brand-orange: #FF8C00;
        }
        @layer base {
            .bg-deep-sky-blue { background-color: var(--deep-sky-blue); }
            .text-deep-sky-blue { color: var(--deep-sky-blue); }
            .bg-brand-orange { background-color: var(--brand-orange); }
            .text-brand-orange { color: var(--brand-orange); }
            .border-deep-sky-blue { border-color: var(--deep-sky-blue); }
        }
        @keyframes continuousWipe {
            0% { transform: translateX(-150%); }
            70% { transform: translateX(250%); }
            100% { transform: translateX(250%); }
        }
        .navbar-wipe-v2 {
            position: absolute;
            top: 0;
            left: 0;
            width: 76%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 191, 255, 0.22), transparent);
            z-index: -1;
            animation: continuousWipe 13s linear infinite;
            animation-delay: 3s;
            filter: blur(14px);
        }
        @keyframes navLineGrow {
            0% { transform: scaleX(0); }
            100% { transform: scaleX(1); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes softFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes floatingSlow {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(15px, -15px); }
            66% { transform: translate(-10px, 10px); }
        }
        .navbar-bottom-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--deep-sky-blue), transparent);
            transform-origin: center;
            animation: navLineGrow 2.5s ease-out forwards;
        }
        .animate-fade-in-up {
            animation: fadeInUp 1s ease-out forwards;
        }
        .animate-soft-float {
            animation: softFloat 4s ease-in-out infinite;
        }
        .animate-gradient-shift {
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
        }
        .animate-floating-slow {
            animation: floatingSlow 6s ease-in-out infinite;
        }
        .offer-card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .offer-card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 40px -10px rgba(0, 191, 255, 0.3);
            border-color: var(--deep-sky-blue);
        }
        .testimonial-card {
            transition: all 0.3s ease;
        }
        .testimonial-card:hover {
            transform: scale(1.02);
        }
        #mobile-menu-checkbox:checked ~ #mobile-menu {
            transform: translateX(0);
        }
        #mobile-menu-checkbox:checked ~ #mobile-menu-overlay {
            opacity: 1;
            pointer-events: auto;
        }
         /*Step Animations*/
            @keyframes stepDown {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.95); }
        }

        .animate-step-down {
            animation: stepDown 0.4s ease-out forwards;
        }

        .exit-animation {
            animation: fadeOut 0.3s ease-in forwards;
        }

</style>

    <style>
    /* Container Setup */
    .coming-soon-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 400px;
    background-color: #fff5eb; /* Soft orange tinted background */
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Glassmorphism Card */
    .glass-card {
    background: white;
    padding: 3rem;
    border-radius: 24px;
    box-shadow: 0 20px 40px rgba(255, 102, 0, 0.1);
    text-align: center;
    max-width: 400px;
    border: 1px solid rgba(255, 102, 0, 0.1);
    }

    /* Pulse Animation Badge */
    .status-badge {
    display: inline-flex;
    align-items: center;
    background: #fff0e6;
    color: #ff6600;
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    }

    .pulse-dot {
    height: 8px;
    width: 8px;
    background-color: #ff6600;
    border-radius: 50%;
    margin-right: 8px;
    animation: pulse 1.5s infinite;
    }

    /* Typography */
    .main-text {
    font-size: 3rem;
    font-weight: 800;
    color: #331a00;
    margin: 0 0 1rem 0;
    letter-spacing: -1px;
    }

    .sub-text {
    color: #665544;
    line-height: 1.6;
    margin-bottom: 2rem;
    }

    /* Animated Progress Bar */
    .progress-bar-container {
    width: 100%;
    height: 8px;
    background: #ffe0cc;
    border-radius: 10px;
    overflow: hidden;
    }

    .progress-fill {
    height: 100%;
    width: 60%; /* Adjust current progress here */
    background: linear-gradient(90deg, #ff9933, #ff6600);
    border-radius: 10px;
    animation: slideIn 2s ease-out forwards;
    }

    /* Keyframes */
    @keyframes pulse {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 102, 0, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 102, 0, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 102, 0, 0); }
    }

    @keyframes slideIn {
    from { width: 0%; }
    to { width: 10%; }
    }
    </style>
