<html class="scroll-smooth" lang="en">

<head>
    <script src="theme.js"></script>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Examfriendly | Empowering the Next Generation of Learners</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
        <script src="navbar.js"></script>
        <script src="footer.js"></script>
    <style type="text/tailwindcss">
        html, body {
  /* This stops the "rubber-band" bounce effect at the edges */
        overscroll-behavior-y: none; 
        }
        :root {
            --deep-sky-blue: #00BFFF;
            --brand-orange: #FF8C00;
        }
        @layer base {
            .bg-deep-sky-blue { background-color: var(--deep-sky-blue); }
            .text-deep-sky-blue { color: var(--deep-sky-blue); }
            .bg-brand-orange { background-color: var(--brand-orange); }
            .text-brand-orange { color: var(--brand-orange); }
            .border-deep-sky-blue { border-color: var(--deep-sky-blue); }
        }
        @keyframes continuousWipe {
            0% { transform: translateX(-150%); }
            70% { transform: translateX(250%); }
            100% { transform: translateX(250%); }
        }
        .navbar-wipe-v2 {
            position: absolute;
            top: 0;
            left: 0;
            width: 76%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 191, 255, 0.22), transparent);
            z-index: -1;
            animation: continuousWipe 13s linear infinite;
            animation-delay: 3s;
            filter: blur(14px);
        }
        @keyframes navLineGrow {
            0% { transform: scaleX(0); }
            100% { transform: scaleX(1); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes softFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes floatingSlow {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(15px, -15px); }
            66% { transform: translate(-10px, 10px); }
        }
        .navbar-bottom-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--deep-sky-blue), transparent);
            transform-origin: center;
            animation: navLineGrow 2.5s ease-out forwards;
        }
        .animate-fade-in-up {
            animation: fadeInUp 1s ease-out forwards;
        }
        .animate-soft-float {
            animation: softFloat 4s ease-in-out infinite;
        }
        .animate-gradient-shift {
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
        }
        .animate-floating-slow {
            animation: floatingSlow 6s ease-in-out infinite;
        }
        .offer-card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .offer-card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 40px -10px rgba(0, 191, 255, 0.3);
            border-color: var(--deep-sky-blue);
        }
        .testimonial-card {
            transition: all 0.3s ease;
        }
        .testimonial-card:hover {
            transform: scale(1.02);
        }
        #mobile-menu-checkbox:checked ~ #mobile-menu {
            transform: translateX(0);
        }
        #mobile-menu-checkbox:checked ~ #mobile-menu-overlay {
            opacity: 1;
            pointer-events: auto;
        }
         /*Step Animations*/
            @keyframes stepDown {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.95); }
        }

        .animate-step-down {
            animation: stepDown 0.4s ease-out forwards;
        }

        .exit-animation {
            animation: fadeOut 0.3s ease-in forwards;
        }

        

</style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00BFFF",
                        "accent": "#FF8C00",
                        "background-light": "#FFFFFF",
                        "background-dark": "#0A0F1C",
                        "slate-950": "#020617",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<header class="relative z-[100]">
    <exam-navbar></exam-navbar>
    </header>
<body class="font-display pt-24 bg-white text-slate-900 dark:bg-slate-950 dark:text-white antialiased overflow-x-hidden">
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-20 left-[10%] w-4 h-4 bg-primary opacity-20 rounded-full animate-floating-slow"></div>
        <div class="absolute top-40 right-[15%] w-3 h-3 bg-accent opacity-20 rounded-full animate-floating-slow"
            style="animation-delay: 1s;"></div>
        <div class="absolute bottom-40 left-[5%] w-6 h-6 border-2 border-primary opacity-10 rounded-full animate-floating-slow"
            style="animation-delay: 2s;"></div>
        <div class="absolute top-[60%] right-[10%] w-4 h-4 border-2 border-accent opacity-10 rounded-full animate-floating-slow"
            style="animation-delay: 1.5s;"></div>
        <div class="absolute top-[80%] left-[20%] w-2 h-2 bg-primary opacity-30 rounded-full animate-floating-slow"
            style="animation-delay: 0.5s;"></div>
    </div>
    
    <div class="w-full flex flex-col items-center py-12 px-6 space-y-10">
  <h2 class="text-[#00bfff] text-3xl font-bold border-b-4 border-current pb-2">View Notes / Resources</h2>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl">
  <div class="relative group">
    <label class="block text-[#00bfff] text-sm font-semibold mb-2">Select Board</label>
    <select id="boardSelect" onchange="fetchStandards()" class="w-full bg-orange-500 text-white font-medium py-3 px-4 rounded-lg appearance-none cursor-pointer focus:outline-none focus:ring-4 focus:ring-[#00bfff] transition-all shadow-lg">
      <option value="" disabled selected>Loading Boards...</option>
    </select>
  </div>

  <div class="relative group">
    <label class="block text-[#00bfff] text-sm font-semibold mb-2">Select Standard</label>
    <select id="standardSelect" onchange="fetchSubjects()" disabled class="w-full bg-orange-500 text-white font-medium py-3 px-4 rounded-lg appearance-none cursor-not-allowed opacity-50 focus:outline-none focus:ring-4 focus:ring-[#00bfff] transition-all shadow-lg">
      <option value="" disabled selected>Select Board First</option>
    </select>
  </div>

  <div class="relative group">
    <label class="block text-[#00bfff] text-sm font-semibold mb-2">Select Subject</label>
    <select id="subjectSelect" onchange="fetchChapters()" disabled class="w-full bg-orange-500 text-white font-medium py-3 px-4 rounded-lg appearance-none cursor-not-allowed opacity-50 focus:outline-none focus:ring-4 focus:ring-[#00bfff] transition-all shadow-lg">
      <option value="" disabled selected>Select Standard First</option>
    </select>
  </div>
</div>

<div id="notesArea" class="w-full max-w-4xl mt-8">
  <h3 class="text-xl font-semibold hidden mb-4" id="notesTitle">Available Notes </h3>
  <div id="notesList" class="grid grid-cols-1 gap-3"></div>
</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://qomhhffaetgwjvifgcai.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFvbWhoZmZhZXRnd2p2aWZnY2FpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyMzY2NjQsImV4cCI6MjA4NjgxMjY2NH0.4Uf9enXmwlMEGZez8E9tNOzfh9AA74qcTUz15yfz1lQ';
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const boardDropdown = document.getElementById('boardSelect');
        const standardDropdown = document.getElementById('standardSelect');
        const subjectDropdown = document.getElementById('subjectSelect');
        const notesList = document.getElementById('notesList');
        const notesTitle = document.getElementById('notesTitle');

        // 1. Initial Load: Fetch Boards
        async function init() {
        const { data, error } = await _supabase.from('boards').select('*');
        if (data) {
        boardDropdown.innerHTML = '<option value="" disabled selected>Choose a Board</option>';
        data.forEach(board => {
            boardDropdown.innerHTML += `<option value="${board.id}">${board.name}</option>`;
        });
        }
        }

        // 2. Fetch Standards based on Board
        async function fetchStandards() {
        const boardId = boardDropdown.value;
        resetDropdown(standardDropdown, "Choose Standard");
        resetDropdown(subjectDropdown, "Select Standard First");
        clearNotesList();

        const { data } = await _supabase.from('standards').select('*').eq('board_id', boardId);
        if (data) {
        enableDropdown(standardDropdown);
        data.forEach(std => {
            standardDropdown.innerHTML += `<option value="${std.id}">${std.name}</option>`;
        });
        }
        }

        // 3. Fetch Subjects based on Standard
        async function fetchSubjects() {
        const standardId = standardDropdown.value;
        resetDropdown(subjectDropdown, "Choose Subject");
        clearNotesList();

        const { data } = await _supabase.from('subject').select('*').eq('standard_id', standardId);
        if (data) {
        enableDropdown(subjectDropdown);
        data.forEach(sub => {
            subjectDropdown.innerHTML += `<option value="${sub.id}">${sub.name}</option>`;
        });
        }
        }

        // 4. Fetch Chapters (Notes) based on Subject
        async function fetchChapters() {
        const subjectId = subjectDropdown.value;
        clearNotesList();

        const { data, error } = await _supabase
        .from('chapters')
        .select('*')
        .eq('subject_id', subjectId); // Ensure your DB column is 'subject_id'

        if (data && data.length > 0) {
        notesTitle.classList.remove('hidden');
        data.forEach((chap, index) => {
            const card = document.createElement('div');
            card.className = "flex items-center justify-between bg-white/5 backdrop-blur-md p-4 rounded-xl border border-gray-200 hover:border-[#00bfff] transition-all shadow-sm w-full animate-fadeIn";
            card.style.animationDelay = `${index * 0.05}s`;
            
            card.innerHTML = `
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-orange-500">description</span>
                <span class="font-medium text-lg">${chap.name}</span>
            </div>
            <a href="${chap.pdf_url || '#'}" target="_blank" 
                class="${chap.pdf_url ? 'flex' : 'hidden'} items-center gap-2 bg-[#00bfff] text-white px-5 py-2.5 rounded-lg font-bold hover:scale-105 transition-all">
                <span>Download</span>
                <span class="material-symbols-outlined text-[20px]">download</span>
            </a>
            `;
            notesList.appendChild(card);
        });
        }
        }

        // Helper Functions
        function resetDropdown(dropdown, text) {
        dropdown.disabled = true;
        dropdown.classList.add('cursor-not-allowed', 'opacity-50');
        dropdown.innerHTML = `<option value="" disabled selected>${text}</option>`;
        }

        function enableDropdown(dropdown) {
        dropdown.disabled = false;
        dropdown.classList.remove('cursor-not-allowed', 'opacity-50');
        }

        function clearNotesList() {
        notesList.innerHTML = '';
        notesTitle.classList.add('hidden');
        }

        init();
</script>
<footer>
<exam-footer></exam-footer>
</footer>
</body>
</html>
