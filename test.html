<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Pile Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="navbar.js" defer></script>
</head>
<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-white transition-colors duration-300">
   <exam-navbar></exam-navbar>

    <main class="pt-32 flex flex-col items-center px-6">
        <div class="max-w-4xl w-full text-center">
            <h2 class="text-[#00bfff] text-4xl font-bold border-b-4 border-[#00bfff] inline-block pb-2 mb-8">
                Paper Pile Test Generator
            </h2>
            <p class="text-slate-600 dark:text-slate-400 text-lg">
                This content is now separate from your navigation code. 
                Any changes you make to <b>navbar.js</b> will reflect here automatically.
            </p>
        </div>
    </main>

    <script>
        // Listen for the theme toggle event coming from the Shadow DOM
        document.addEventListener('toggle-theme', () => {
            document.documentElement.classList.toggle('dark');
        });
    </script>
</body>
</html>
