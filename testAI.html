<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examfriendly AI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script type="module">
        // Import Gradio Client for seamless API calls
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        // IMPORTANT: Replace with your actual Hugging Face Space URL
        const HF_SPACE_URL = "ExamFriendly/aboutexam"; 

        let clientInstance; // To store the client after connection

        async function connectGradioClient() {
            if (!clientInstance) {
                try {
                    clientInstance = await Client.connect(HF_SPACE_URL);
                    console.log("Connected to Gradio client!");
                } catch (error) {
                    console.error("Failed to connect to Gradio client:", error);
                    appendMessage("bot", "Error connecting to the AI. Please try again later.");
                    return null;
                }
            }
            return clientInstance;
        }

        async function sendMessageToBot(message) {
            const client = await connectGradioClient();
            if (!client) return;

            try {
                // The /chat endpoint maps to your `chat` function in app.py
                // It expects an object with a 'message' key
                const response = await client.predict("/chat", {
                    message: message,
                });
                // The actual answer is usually in the first element of the data array
                return response.data[0]; 
            } catch (error) {
                console.error("Error sending message to bot:", error);
                return "I'm having trouble connecting right now. Please try again.";
            }
        }

        window.sendMessageToBot = sendMessageToBot; // Expose to global scope
    </script>
    <style>
        :root {
            --primary-color: DeepSkyBlue; /* Examfriendly accent color */
            --primary-dark-color: #008CBA;
            --background-color: #f0f8ff; /* Light blue tint for background */
            --chat-bg-color: #ffffff;
            --text-color: #333;
            --bot-bubble-color: #e0f2f7; /* Lighter blue for bot messages */
            --user-bubble-color: #d1ecf1; /* Slightly different light blue for user */
            --border-radius: 8px;
            --font-family: 'Roboto', sans-serif;
        }

        body {
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--background-color);
            color: var(--text-color);
        }

        #chat-container {
            width: 100%;
            max-width: 450px;
            background-color: var(--chat-bg-color);
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        #chat-header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
        }

        #chat-messages {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message-bubble {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: var(--border-radius);
            line-height: 1.4;
            word-wrap: break-word; /* Ensure long words wrap */
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .message-bubble.user {
            align-self: flex-end;
            background-color: var(--user-bubble-color);
            color: var(--text-color);
        }

        .message-bubble.bot {
            align-self: flex-start;
            background-color: var(--bot-bubble-color);
            color: var(--text-color);
        }

        #chat-input-area {
            display: flex;
            border-top: 1px solid #eee;
            padding: 10px 15px;
            background-color: var(--chat-bg-color);
        }

        #user-input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-family: var(--font-family);
            font-size: 1em;
            margin-right: 10px;
        }

        #user-input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 2px rgba(var(--primary-color), 0.2);
        }

        #send-button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            padding: 10px 18px;
            cursor: pointer;
            font-family: var(--font-family);
            font-size: 1em;
            transition: background-color 0.2s ease;
        }

        #send-button:hover {
            background-color: var(--primary-dark-color);
        }

        /* Loading indicator for bot */
        .loading-dots {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-left: 15px;
            min-height: 20px;
        }
        .loading-dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--primary-color);
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

    </style>
</head>
<body>
    <div id="chat-container">
        <div id="chat-header">Examfriendly AI Assistant</div>
        <div id="chat-messages">
            <div class="message-bubble bot">Hello! I'm your Examfriendly AI Assistant. How can I help you today?</div>
        </div>
        <div id="chat-input-area">
            <input type="text" id="user-input" placeholder="Ask about tuitions, courses, or resources...">
            <button id="send-button" onclick="handleSend()">Send</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');

        function appendMessage(sender, message) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message-bubble', sender);
            messageElement.innerHTML = message; // Use innerHTML to allow basic formatting like bold if needed
            chatMessages.appendChild(messageElement);
            chatMessages.scrollTop = chatMessages.scrollHeight; // Auto-scroll to bottom
        }

        let loadingBubble = null;

        function showLoading() {
            loadingBubble = document.createElement('div');
            loadingBubble.classList.add('message-bubble', 'bot');
            loadingBubble.innerHTML = `
                <div class="loading-dots">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatMessages.appendChild(loadingBubble);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideLoading() {
            if (loadingBubble) {
                loadingBubble.remove();
                loadingBubble = null;
            }
        }

        async function handleSend() {
            const message = userInput.value.trim();
            if (message === '') return;

            appendMessage('user', message);
            userInput.value = '';
            showLoading(); // Show loading indicator

            const botResponse = await window.sendMessageToBot(message);
            hideLoading(); // Hide loading indicator
            appendMessage('bot', botResponse);
        }

        userInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                sendButton.click();
            }
        });

        // Initialize connection on page load
        document.addEventListener('DOMContentLoaded', connectGradioClient);
    </script>
</body>
</html>
